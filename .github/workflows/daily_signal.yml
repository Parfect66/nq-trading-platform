name: NQ Daily Signal

on:
  schedule:
    # 14:10 UTC = 10:10am EDT (summer) / 09:10am EST (winter)
    # Runs Monday–Friday only
    - cron: '10 14 * * 1-5'
  workflow_dispatch:  # allows you to trigger it manually from GitHub

jobs:
  run-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run daily signal
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
        run: python strategies/daily_signal.py
